<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virage 3D Editor</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/toolbar.css">
  <link rel="stylesheet" href="css/dialogs.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170/examples/jsm/",
      "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.7.8/build/index.module.js",
      "three-bvh-csg": "https://cdn.jsdelivr.net/npm/three-bvh-csg@0.0.16/src/index.js"
    }
  }
  </script>
</head>
<body>
  <header id="toolbar">
    <div class="toolbar-left">
      <a class="toolbar-brand" href="https://github.com/Rai220/virage_3d_editor" target="_blank" rel="noopener" title="Virage 3D Editor — GitHub">
        <svg class="brand-logo" viewBox="0 0 32 32" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="10" width="14" height="14" rx="2" fill="#4a90d9" opacity="0.85"/>
          <rect x="10" y="6" width="14" height="14" rx="2" fill="#6ab0ff" opacity="0.7"/>
          <rect x="14" y="2" width="14" height="14" rx="2" fill="#a0cfff" opacity="0.55"/>
        </svg>
        <span class="brand-name">Virage 3D</span>
      </a>

      <div class="toolbar-separator"></div>

      <button class="toolbar-btn" id="btn-boolean-union" title="Объединить два объекта">
        <span class="btn-icon">⊕</span><span class="btn-label">Объединить</span>
      </button>
      <button class="toolbar-btn" id="btn-boolean-subtract" title="Вычесть один объект из другого">
        <span class="btn-icon">⊖</span><span class="btn-label">Вычесть</span>
      </button>
      <button class="toolbar-btn" id="btn-boolean-intersect" title="Пересечение двух объектов">
        <span class="btn-icon">⊗</span><span class="btn-label">Пересечь</span>
      </button>

      <div class="toolbar-separator"></div>

      <button class="toolbar-btn toolbar-btn-danger" id="btn-delete" title="Удалить выбранный объект (Delete)">
        <span class="btn-icon">🗑</span><span class="btn-label">Удалить</span>
      </button>
      <button class="toolbar-btn toolbar-btn-danger" id="btn-clear-all" title="Очистить всю сцену">
        <span class="btn-icon">✕</span><span class="btn-label">Очистить всё</span>
      </button>
      <button class="toolbar-btn" id="btn-drop-to-table" title="Положить на стол (G)">
        <span class="btn-icon">⬇</span><span class="btn-label">На стол</span>
      </button>

      <div class="toolbar-separator"></div>

      <button class="toolbar-btn" id="btn-save" title="Сохранить проект (Ctrl+S)">
        <span class="btn-icon">💾</span><span class="btn-label">Сохранить</span>
      </button>
      <button class="toolbar-btn" id="btn-load" title="Загрузить проект (JSON)">
        <span class="btn-icon">📂</span><span class="btn-label">Загрузить</span>
      </button>
      <button class="toolbar-btn" id="btn-export" title="Экспорт STL (Ctrl+E)">
        <span class="btn-icon">🖨</span><span class="btn-label">Экспорт STL</span>
      </button>
      <button class="toolbar-btn" id="btn-import-stl" title="Импорт STL">
        <span class="btn-icon">📥</span><span class="btn-label">Импорт STL</span>
      </button>
    </div>
    <div class="toolbar-right">
      <button class="toolbar-btn" id="btn-undo" title="Отменить (Ctrl+Z)">↩ Отмена</button>
      <button class="toolbar-btn" id="btn-redo" title="Повторить (Ctrl+Shift+Z)">↪ Повтор</button>
    </div>
  </header>

  <main id="workspace">
    <aside id="primitives-panel">
      <h3>Фигуры</h3>
      <button class="prim-btn" id="btn-prim-box" data-primitive="box" title="Куб">
        <span class="prim-icon">◻</span><span class="prim-label">Куб</span>
      </button>
      <button class="prim-btn" id="btn-prim-sphere" data-primitive="sphere" title="Сфера">
        <span class="prim-icon">●</span><span class="prim-label">Сфера</span>
      </button>
      <button class="prim-btn" id="btn-prim-cylinder" data-primitive="cylinder" title="Цилиндр">
        <span class="prim-icon">⬬</span><span class="prim-label">Цилиндр</span>
      </button>
      <button class="prim-btn" id="btn-prim-cone" data-primitive="cone" title="Конус">
        <span class="prim-icon">△</span><span class="prim-label">Конус</span>
      </button>
      <button class="prim-btn" id="btn-prim-torus" data-primitive="torus" title="Тор">
        <span class="prim-icon">◎</span><span class="prim-label">Тор</span>
      </button>
    </aside>
    <div id="viewport-container">
      <canvas id="viewport"></canvas>
      <canvas id="axis-indicator"></canvas>
    </div>
    <aside id="properties-panel">
      <h3>Свойства</h3>
      <div id="properties-content">
        <p class="hint">Выберите объект для редактирования</p>
      </div>
    </aside>
  </main>

  <footer id="statusbar">
    <div class="statusbar-left">
      <button class="statusbar-btn active" id="btn-translate" title="Перемещение (W)">Перемещение <kbd>W</kbd></button>
      <button class="statusbar-btn" id="btn-rotate" title="Вращение (E)">Вращение <kbd>E</kbd></button>
      <button class="statusbar-btn" id="btn-scale" title="Масштаб (R)">Масштаб <kbd>R</kbd></button>
    </div>
    <div class="statusbar-center">
      <span>⊞ Сетка: <select id="grid-size">
        <option value="1">1мм</option>
        <option value="5" selected>5мм</option>
        <option value="10">10мм</option>
      </select></span>
      <button class="statusbar-btn active" id="btn-toggle-table" title="Показать/скрыть рабочий стол">📐 Стол</button>
    </div>
    <div class="statusbar-right">
      <span id="status-text">Готово</span>
      <span class="statusbar-separator">|</span>
      <a class="statusbar-link" href="https://github.com/rai220" target="_blank" rel="noopener" title="Автор">Константин Крестников (rai220)</a>
      <span class="statusbar-separator">|</span>
      <a class="statusbar-link" href="https://github.com/Rai220/virage_3d_editor" target="_blank" rel="noopener" title="Исходный код">GitHub</a>
      <span class="statusbar-separator">|</span>
      <a class="statusbar-link" href="https://github.com/Rai220/virage_3d_editor/blob/main/LICENSE" target="_blank" rel="noopener" title="Лицензия">MIT</a>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
